name: Construir y publicar imagen Docker

# Se ejecuta solo cada vez que subes cambios a la rama principal,
# o cuando lo lanzas a mano desde la pestaña Actions.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # necesario para publicar en GHCR

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Calcular el nombre de la imagen (en minúsculas)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/print-agent" >> "$GITHUB_ENV"

      # QEMU + Buildx permiten construir para PC y para Raspberry Pi (ARM)
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar (multi-arquitectura)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
