name: Construir y publicar imagen Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Calcular el nombre de la imagen (en minúsculas)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/print-agent" >> "$GITHUB_ENV"

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
